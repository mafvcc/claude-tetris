<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Tetris</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="wrapper">
    <h1 class="game-title">TETRIS</h1>

    <div class="theme-toggle">
      <span class="theme-icon">&#9789;</span>
      <label class="toggle-switch">
        <input type="checkbox" id="theme-toggle" />
        <span class="toggle-track"><span class="toggle-thumb"></span></span>
      </label>
      <span class="theme-icon">&#9728;</span>
    </div>

    <div class="game-container">
      <canvas id="board" width="300" height="600"></canvas>

      <aside class="panel">
        <div class="panel-section">
          <span class="label">SCORE</span>
          <span class="value" id="score">0</span>
        </div>
        <div class="panel-section">
          <span class="label">LINES</span>
          <span class="value" id="lines">0</span>
        </div>
        <div class="panel-section">
          <span class="label">LEVEL</span>
          <span class="value" id="level">1</span>
        </div>

        <div class="panel-section">
          <span class="label">NEXT</span>
          <canvas id="next-canvas" width="120" height="120"></canvas>
        </div>

        <div class="panel-section controls">
          <span class="label">CONTROLS</span>
          <ul>
            <li><kbd>←</kbd><kbd>→</kbd> mover</li>
            <li><kbd>↑</kbd> rotar</li>
            <li><kbd>↓</kbd> bajar</li>
            <li><kbd>Space</kbd> caída</li>
            <li><kbd>P</kbd> pausa</li>
          </ul>
        </div>
      </aside>
    </div>

    <div id="overlay" class="overlay hidden" data-mode="gameover">
      <div class="overlay-box">
        <p id="overlay-title">GAME OVER</p>
        <p id="overlay-score"></p>

        <!-- Modo GAME OVER -->
        <button id="restart-btn" class="overlay-btn">Reiniciar</button>

        <!-- Modo PAUSA -->
        <div id="pause-menu" class="pause-menu">
          <button id="resume-btn" class="overlay-btn">Reanudar</button>
          <button id="restart-pause-btn" class="overlay-btn overlay-btn--secondary">Reiniciar</button>
          <button id="controls-toggle-btn" class="overlay-btn overlay-btn--ghost">Ver controles</button>
          <div id="controls-detail" class="controls-detail hidden">
            <ul>
              <li><kbd>←</kbd><kbd>→</kbd> mover</li>
              <li><kbd>↑</kbd> / <kbd>X</kbd> rotar</li>
              <li><kbd>↓</kbd> bajar suave</li>
              <li><kbd>Space</kbd> caída dura</li>
              <li><kbd>P</kbd> / <kbd>Esc</kbd> pausa</li>
            </ul>
          </div>
          <div class="level-selector">
            <label for="start-level-select">Nivel inicial:</label>
            <select id="start-level-select">
              <option value="1">1</option>
              <option value="2">2</option>
              <option value="3">3</option>
              <option value="4">4</option>
              <option value="5">5</option>
              <option value="6">6</option>
              <option value="7">7</option>
              <option value="8">8</option>
              <option value="9">9</option>
              <option value="10">10</option>
            </select>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script src="game.js"></script>
</body>
</html>
