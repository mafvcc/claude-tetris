<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Tetris</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="wrapper">
    <h1 class="game-title">TETRIS</h1>

    <div class="top-bar">
      <div class="theme-toggle">
        <span class="theme-icon">&#9789;</span>
        <label class="toggle-switch">
          <input type="checkbox" id="theme-toggle" />
          <span class="toggle-track"><span class="toggle-thumb"></span></span>
        </label>
        <span class="theme-icon">&#9728;</span>
      </div>
      <select id="skin-select">
        <option value="retro">Retro</option>
        <option value="neon">Neon</option>
        <option value="pastel">Pastel</option>
        <option value="pixel">Pixel</option>
      </select>
    </div>

    <div class="game-container">
      <canvas id="board" width="300" height="600"></canvas>

      <aside class="panel">
        <div class="panel-section">
          <span class="label">SCORE</span>
          <span class="value" id="score">0</span>
        </div>
        <div class="panel-section">
          <span class="label">LINES</span>
          <span class="value" id="lines">0</span>
        </div>
        <div class="panel-section">
          <span class="label">LEVEL</span>
          <span class="value" id="level">1</span>
        </div>

        <div class="panel-section">
          <span class="label">NEXT</span>
          <canvas id="next-canvas" width="120" height="120"></canvas>
        </div>

        <div class="panel-section controls">
          <span class="label">CONTROLS</span>
          <ul>
            <li><kbd>←</kbd><kbd>→</kbd> mover</li>
            <li><kbd>↑</kbd> rotar</li>
            <li><kbd>↓</kbd> bajar</li>
            <li><kbd>Space</kbd> caída</li>
            <li><kbd>P</kbd> pausa</li>
          </ul>
        </div>
      </aside>
    </div>

    <div class="records-section">
      <div class="records-header">
        <span class="label">HIGH SCORES</span>
        <button id="reset-records-btn">Reset</button>
      </div>
      <div id="main-records"></div>
    </div>

    <div id="pause-overlay" class="overlay hidden">
      <div class="overlay-box pause-menu">
        <p class="pause-title">PAUSA</p>
        <div class="pause-buttons">
          <button id="resume-btn">&#9654; Reanudar</button>
          <button id="restart-pause-btn">&#8635; Reiniciar</button>
          <button id="controls-toggle-btn">? Ver controles</button>
        </div>
        <div id="pause-controls-list" class="pause-controls-list hidden">
          <ul>
            <li><kbd>←</kbd><kbd>→</kbd> mover</li>
            <li><kbd>↑</kbd> rotar</li>
            <li><kbd>↓</kbd> bajar</li>
            <li><kbd>Space</kbd> caída dura</li>
            <li><kbd>P</kbd> / <kbd>Esc</kbd> pausa</li>
          </ul>
        </div>
        <div class="start-level-section">
          <span class="label">NIVEL INICIAL</span>
          <div class="level-stepper">
            <button id="level-dec-btn">&#8722;</button>
            <span id="start-level-val">1</span>
            <button id="level-inc-btn">&#43;</button>
          </div>
        </div>
      </div>
    </div>

    <div id="game-over-overlay" class="overlay hidden">
      <div class="overlay-box">
        <p class="overlay-title">GAME OVER</p>
        <div id="game-stats" class="game-stats"></div>
        <div id="name-section" class="name-section hidden">
          <p class="new-record-label">¡NUEVO RÉCORD!</p>
          <div class="name-input-row">
            <input id="player-name" type="text" placeholder="Tu nombre" maxlength="12" autocomplete="off" />
            <button id="save-btn">OK</button>
          </div>
        </div>
        <div id="overlay-records"></div>
        <button id="restart-btn">Reiniciar</button>
      </div>
    </div>
  </div>

  <script src="game.js"></script>
</body>
</html>
